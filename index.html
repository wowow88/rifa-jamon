<!DOCTYPE html>
<html>
<head>
  <title>Rifa Jamón</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: Arial; padding: 10px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
    .card {
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    .disponible { background: #eee; }
    .vendido { background: orange; }
    .pagado { background: green; color: white; }
  </style>
</head>
<body>

<h2>Rifa Jamón</h2>
<div class="grid" id="grid"></div>

<script>
const supabase = window.supabase.createClient(
  "TU_URL",
  "TU_ANON_KEY"
);

async function cargar() {
  const { data } = await supabase.from("rifa").select("*").order("numero");

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(n => {
    let clase = "disponible";
    if (n.pagado) clase = "pagado";
    else if (n.estado === "vendido") clase = "vendido";

    const div = document.createElement("div");
    div.className = "card " + clase;
    div.innerText = n.numero;

    div.onclick = async () => {
      if (n.estado !== "disponible") return;

      const nombre = prompt("Nombre comprador:");
      if (!nombre) return;

      await supabase.from("rifa").update({
        estado: "vendido",
        nombre: nombre
      }).eq("id", n.id);

      cargar();
    };

    grid.appendChild(div);
  });
}

cargar();
</script>

</body>
</html>
