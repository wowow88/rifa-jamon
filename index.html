<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<meta charset="UTF-8">
<title>Rifa Jamón</title>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;margin:0}
h1{margin:20px 0 5px}
#estado{font-size:13px;color:#555;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:15px;max-width:600px;margin:auto}
.num{padding:20px;border-radius:12px;font-weight:bold;font-size:20px;cursor:pointer}
.disponible{background:#ddd}
.vendido{background:#ffcc00}
.pagado{background:#00cc66;color:white}
</style>
</head>
<body>

<h1>Rifa Jamón</h1>
<div id="estado">Cargando números...</div>
<div class="grid" id="grid"></div>

<script>
const SUPABASE_URL = "https://lahtsdinzrqlsqbthysx.supabase.co";
const SUPABASE_KEY = "sb_publishable_IyN4z4MIO-G3auJ9PTBn_g_-xrxk1XO";

async function cargar(){
  const estado = document.getElementById("estado");
  const grid = document.getElementById("grid");

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rifa?select=*&order=numero.asc`, {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    if (!res.ok) {
      estado.innerText = "Error Supabase: " + res.status + " " + await res.text();
      return;
    }

    const data = await res.json();
    estado.innerText = "Números cargados: " + data.length;
    grid.innerHTML = "";

    data.forEach(n => {
      const div = document.createElement("div");
      let clase = "disponible";
      if (n.estado === "vendido") clase = "vendido";
      if (n.pagado === true) clase = "pagado";

      div.className = "num " + clase;
      div.innerText = String(n.numero).padStart(2,"0");

      div.onclick = async () => {
        if (n.estado !== "disponible") {
          alert("Número " + div.innerText + "\\nComprador: " + (n.nombre || "sin nombre"));
          return;
        }

        const nombre = prompt("Nombre del comprador:");
        if (!nombre) return;

        await fetch(`${SUPABASE_URL}/rest/v1/rifa?id=eq.${n.id}`, {
          method: "PATCH",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            Prefer: "return=minimal"
          },
          body: JSON.stringify({ estado:"vendido", nombre:nombre })
        });

        cargar();
      };

      grid.appendChild(div);
    });

  } catch(e) {
    estado.innerText = "Error de conexión: " + e.message;
  }
}

cargar();
</script>

</body>
</html>
