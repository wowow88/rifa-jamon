<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Rifa Jamón</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; margin:0; }
    h1 { margin:20px 0 5px; }
    #estado { margin-bottom:15px; font-size:14px; color:#555; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; padding:15px; max-width:600px; margin:auto; }
    .num { padding:20px; border-radius:12px; font-weight:bold; font-size:20px; cursor:pointer; }
    .disponible { background:#ddd; }
    .vendido { background:#ffcc00; }
    .pagado { background:#00cc66; color:white; }
  </style>
</head>
<body>

<h1>Rifa Jamón</h1>
<div id="estado">Cargando números...</div>
<div class="grid" id="grid"></div>

<script>
const SUPABASE_URL = "https://lahtsdinzrqlsqbthysx.supabase.co";
const SUPABASE_KEY = "sb_publishable_IyN4z4MIO-G3auJ9PTBn_g_-xrxk1XO";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function cargar() {
  const estado = document.getElementById("estado");
  const grid = document.getElementById("grid");

  const { data, error } = await supabase
    .from("rifa")
    .select("*")
    .order("numero", { ascending: true });

  if (error) {
    estado.innerText = "Error: " + error.message;
    console.error(error);
    return;
  }

  estado.innerText = "Números cargados: " + data.length;
  grid.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");

    let clase = "disponible";
    if (n.estado === "vendido") clase = "vendido";
    if (n.pagado === true) clase = "pagado";

    div.className = "num " + clase;
    div.innerText = String(n.numero).padStart(2, "0");

    div.onclick = async () => {
      if (n.estado !== "disponible") {
        alert("Número " + String(n.numero).padStart(2, "0") + "\nComprador: " + (n.nombre || "sin nombre"));
        return;
      }

      const nombre = prompt("Nombre del comprador:");
      if (!nombre) return;

      const { error } = await supabase
        .from("rifa")
        .update({
          estado: "vendido",
          nombre: nombre
        })
        .eq("id", n.id);

      if (error) {
        alert("Error al vender: " + error.message);
        return;
      }

      cargar();
    };

    div.ondblclick = async () => {
      if (n.estado !== "vendido") return;

      const { error } = await supabase
        .from("rifa")
        .update({ pagado: true })
        .eq("id", n.id);

      if (error) {
        alert("Error al marcar pagado: " + error.message);
        return;
      }

      cargar();
    };

    grid.appendChild(div);
  });
}

cargar();
</script>

</body>
</html>
